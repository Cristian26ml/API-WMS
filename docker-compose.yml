services:
  postgres:
    image: postgres:15-alpine
    container_name: wms_postgres_container
    restart: always
    environment:
      POSTGRES_USER: cristian
      POSTGRES_PASSWORD: wmsadmin123
      POSTGRES_DB: wms_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: